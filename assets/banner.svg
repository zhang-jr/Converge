<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dot grid pattern -->
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.07"/>
    </pattern>
    <!-- Horizontal fade for depth -->
    <linearGradient id="hfade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0d1117" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#161b22" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="1"/>
    </linearGradient>
    <!-- Teal glow for accent line -->
    <filter id="glow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="260" fill="#0d1117"/>
  <!-- Gradient overlay -->
  <rect width="1200" height="260" fill="url(#hfade)" opacity="0.6"/>
  <!-- Dot grid -->
  <rect width="1200" height="260" fill="url(#dots)"/>

  <!-- Left loop arc (control loop motif) -->
  <circle cx="148" cy="130" r="72" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.13" stroke-dasharray="4 7"/>
  <circle cx="148" cy="130" r="48" fill="none" stroke="#00d4aa" stroke-width="0.5" opacity="0.08" stroke-dasharray="2 8"/>

  <!-- Right loop arc -->
  <circle cx="1052" cy="130" r="72" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.13" stroke-dasharray="4 7"/>
  <circle cx="1052" cy="130" r="48" fill="none" stroke="#00d4aa" stroke-width="0.5" opacity="0.08" stroke-dasharray="2 8"/>

  <!-- Subtle bracket accents flanking title -->
  <text x="320" y="150" font-family="'Courier New', Courier, monospace" font-size="72" fill="#00d4aa" opacity="0.18" font-weight="100">[</text>
  <text x="813" y="150" font-family="'Courier New', Courier, monospace" font-size="72" fill="#00d4aa" opacity="0.18" font-weight="100">]</text>

  <!-- Main title -->
  <text
    x="600" y="150"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="68"
    font-weight="700"
    fill="#e6edf3"
    letter-spacing="20"
    filter="url(#glow)">CONVERGE</text>

  <!-- Accent underline with glow -->
  <line x1="420" y1="166" x2="780" y2="166" stroke="#00d4aa" stroke-width="1.5" opacity="0.9" filter="url(#glow)"/>
  <circle cx="345" cy="166" r="2.5" fill="#00d4aa" opacity="0.9" filter="url(#glow)"/>
  <circle cx="828" cy="166" r="2.5" fill="#00d4aa" opacity="0.9" filter="url(#glow)"/>

  <!-- Subtitle -->
  <text
    x="600" y="202"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    fill="#8b949e"
    letter-spacing="5">DECLARATIVE  ·  OBSERVABLE  ·  CONVERGING</text>
</svg>
